<!doctype html>
<html lang="en" class="h-full antialiased">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vän · Volvo</title>
    <!-- Google Fonts: Plus Jakarta Sans, Oswald, Geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Oswald:wght@300;400;500&display=swap" rel="stylesheet" />
    <!-- Geist font via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/geist@1.2.0/dist/fonts/geist-sans/style.css" rel="stylesheet" />
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <!-- No-flash theme: apply class synchronously before React renders -->
    <script>
      (function () {
        var t = localStorage.getItem('van-theme') || 'light';
        document.documentElement.classList.add(t);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
