<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volvo Vän — Live Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0b;
      font-family: sans-serif;
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
      gap: 0;
    }

    .panel {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    /* Subtle divider */
    .panel-right {
      border-left: 1px solid rgba(255,255,255,0.06);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #0a0a0b;
    }

    /* Label chips — positioned top-center of each panel */
    .label {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
      white-space: nowrap;
    }

    .label-live::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      margin-right: 6px;
      animation: pulse 1.5s ease-in-out infinite;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Left: Nuxt conversational UI -->
    <div class="panel panel-left">
      <span class="label">Freja — Voice &amp; Chat</span>
      <iframe
        src="/"
        title="Volvo Vän Conversational UI"
        allow="microphone; autoplay"
      ></iframe>
    </div>

    <!-- Right: React dashboard (live Firestore listener) -->
    <div class="panel panel-right">
      <span class="label label-live">Dashboard — Live</span>
      <iframe
        src="/dashboard"
        title="Vän Analytics Dashboard"
      ></iframe>
    </div>
  </div>
</body>
</html>
