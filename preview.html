<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vän — Analytics Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0b;
      overflow: hidden;
    }

    .layout {
      display: grid;
      /* Dashboard takes ~72%, conversational panel ~28% */
      grid-template-columns: 1fr 380px;
      height: 100vh;
      width: 100vw;
    }

    /* ── Dashboard (main) ── */
    .panel-dashboard {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .panel-dashboard iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #0f0f10;
    }

    /* ── Conversational panel (right) ── */
    .panel-chat {
      position: relative;
      height: 100vh;
      overflow: hidden;
      border-left: 1px solid rgba(255,255,255,0.07);
      background: #000;
      display: flex;
      flex-direction: column;
    }

    /* Header bar */
    .chat-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .chat-header-title {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      font-family: sans-serif;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #34d399;
      font-family: sans-serif;
      font-weight: 600;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #34d399;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* iframe fills the rest of the chat panel */
    .chat-iframe-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .chat-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Divider drag hint */
    .divider {
      position: absolute;
      top: 0;
      left: -1px;
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.07);
      cursor: col-resize;
    }

    .dev-link {
      position: fixed;
      bottom: 14px;
      right: 16px;
      z-index: 100;
      font-family: sans-serif;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 5px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      transition: all 0.2s;
    }
    .dev-link:hover {
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div class="layout">

    <!-- Left: React dashboard (dominant) -->
    <div class="panel-dashboard">
      <iframe
        id="dashboard-iframe"
        src="/dashboard/"
        title="Vän Analytics Dashboard"
      ></iframe>
    </div>

    <!-- Right: Nuxt conversational UI (compact panel) -->
    <div class="panel-chat">
      <div class="chat-header">
        <span class="chat-header-title">Freja — Voice &amp; Chat</span>
        <span class="live-badge">
          <span class="live-dot"></span>
          Live
        </span>
      </div>
      <div class="chat-iframe-wrap">
        <iframe
          id="nuxt-iframe"
          title="Freja Conversational UI"
          allow="microphone; autoplay; camera"
        ></iframe>
      </div>
    </div>

  </div>

  <a href="/preview/dev" class="dev-link">How it works</a>

  <script>
    // Generate a shared userId so both iframes reference the same user
    const sharedUserId = crypto.randomUUID();

    // Set the Nuxt iframe src with the shared user id
    document.getElementById('nuxt-iframe').src = '/index.html?user=' + sharedUserId;

    // Bridge postMessages from Nuxt iframe to the dashboard iframe
    window.addEventListener('message', function (event) {
      if (event.data && event.data.type === 'freja:session-started') {
        var dashboardIframe = document.getElementById('dashboard-iframe');
        if (dashboardIframe && dashboardIframe.contentWindow) {
          dashboardIframe.contentWindow.postMessage(
            { type: 'freja:session-started', userId: sharedUserId },
            '*'
          );
        }
      }
    });
  </script>
</body>
</html>
